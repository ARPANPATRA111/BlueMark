name: bluetooth_attendance_tracker
description: "Bluetooth Attendance Tracker - zero-friction BLE attendance for classrooms."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.35.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.11
  firebase_auth: ^5.6.2
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  shared_preferences: ^2.5.3
  permission_handler: ^12.0.1
  connectivity_plus: ^6.1.5
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  intl: ^0.19.0
  crypto: ^3.0.6
  flutter_local_notifications: ^19.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
